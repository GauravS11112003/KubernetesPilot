apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-nginx
  namespace: default
  labels:
    app: broken-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: broken-nginx
  template:
    metadata:
      labels:
        app: broken-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:super-latest-broken
          ports:
            - containerPort: 80

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-app
  namespace: default
  labels:
    app: crashloop-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-app
  template:
    metadata:
      labels:
        app: crashloop-app
    spec:
      containers:
        - name: crasher
          image: busybox:1.36
          command: ["sh", "-c", "exit 1"]
